name: aurix_flutter
description: Aurix — личный кабинет артиста и загрузка релизов (iOS, Android, Web).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^13.2.0
  file_picker: ^6.1.1
  uuid: ^4.2.2
  intl: ^0.19.0
  http: ^1.2.0
  shared_preferences: ^2.2.2
  path: ^1.9.0
  path_provider: ^2.1.5
  mime: ^2.0.0
  archive: ^4.0.2
  url_launcher: ^6.2.0
  pdf: ^3.11.0
  printing: ^5.13.0
  docx_creator: ^1.0.9
  share_plus: ^12.0.1
  dio: ^5.9.2
  flutter_secure_storage: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
        - asset: assets/fonts/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700
    - family: Unbounded
      fonts:
        - asset: assets/fonts/Unbounded-Variable.ttf
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Variable.ttf
