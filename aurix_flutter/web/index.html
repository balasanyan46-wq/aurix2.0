<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <meta name="theme-color" content="#050505">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800;900&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AURIX — AI-платформа для артистов</title>
  <meta name="description" content="AURIX — система роста артиста. Дистрибуция, AI-стратегия, аналитика, промо.">
  <meta property="og:title" content="AURIX — система роста артиста">
  <meta property="og:description" content="Дистрибуция, AI-стратегия, аналитика — всё в одной системе.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="icons/Icon-512.png">
  <meta name="keywords" content="AURIX, платформа для артистов, дистрибуция музыки, AI стратегия, аналитика музыки, продвижение артиста, музыкальная платформа">
  <link rel="canonical" href="https://aurixmusic.ru/">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="aurix_fx.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:#050505}
    #loading{
      position:fixed;inset:0;z-index:9999;
      display:flex;align-items:center;justify-content:center;
      background:#050505;
      transition:opacity .6s ease;
    }
    #loading.done{opacity:0;pointer-events:none}
    .l-logo{
      font-family:'Unbounded',sans-serif;
      font-size:24px;font-weight:700;letter-spacing:6px;
      color:#FF6A1A;
      animation:pulse 2s ease-in-out infinite;
    }
    @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
  </style>
</head>
<body>
  <div id="loading">
    <div class="l-logo">AURIX</div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading');
      if (el) { el.classList.add('done'); setTimeout(function() { el.remove(); }, 700); }
    });
    setTimeout(function() {
      var el = document.getElementById('loading');
      if (el && !el.classList.contains('done')) {
        if (document.querySelector('flt-glass-pane') || document.querySelector('flutter-view')) {
          el.classList.add('done');
          setTimeout(function() { el.remove(); }, 700);
        }
      }
    }, 6000);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(r) { r.unregister(); });
      });
    }
    if ('caches' in window) {
      caches.keys().then(function(names) {
        names.forEach(function(n) { caches.delete(n); });
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
