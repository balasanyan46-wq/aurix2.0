# ── BLOCK DIRECT S3/MinIO ACCESS ─────────────────────────────
# Replace the existing /storage/ location block in your nginx config.
#
# BEFORE (insecure — allows anyone to read any file):
#   location /storage/ {
#       proxy_pass http://localhost:9000/aurix/;
#   }
#
# AFTER (all access through signed URLs only):

# Block direct /storage/ access — return 403
location /storage/ {
    # Reject all direct file requests.
    # Clients must use GET /upload/signed?key=... to get a time-limited URL.
    return 403 '{"error":"direct access denied, use signed URLs"}';
    add_header Content-Type application/json;
}

# Proxy presigned S3 requests (MinIO generates URLs with query auth)
# MinIO listens on port 9000; presigned URLs include X-Amz-Signature etc.
location /s3-signed/ {
    internal;  # only reachable via NestJS proxy, not directly
    proxy_pass http://localhost:9000/;
    proxy_set_header Host $host;
}
